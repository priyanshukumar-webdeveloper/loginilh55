<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AR Typing</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="media.css">
</head>
<body>

    <!-- Navbar -->
    <div class="nav">
    <div class="logo">
            <img src="ar logo img/ar/apple-touch-icon.webp" alt="logo">
        </div>

        <div class="session">
            <p>Clear Session</p>
        </div>
    </div>

    <!-- Login Box -->
    <div class="container">
        <div class="box">

            <h1>Login to AR Typing</h1>
            <p class="sub">Secure login • Continue your typing journey</p>

            <form>

                <div class="input-group">
                    
                    <label>Email</label>
                    <input type="email" placeholder="Enter your email">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="password-box">
                        <input type="password" placeholder="Enter your password">
                        
                    </div>
                </div>

              <a href="forgot.html" class="forgot">Forgot Password</a>
                <button class="btn">LOGIN</button>
                
                 <p class="hh">Don't have an account? <a href="registration.html">Create one</a></p>
            </form>
            
        </div>
         
    </div>
        <p class="copyright">© 2026 AR Typing Platform. All rights reserved.</p>

        
</body>
</html>

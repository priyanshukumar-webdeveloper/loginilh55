<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="media.css">
</head>
<body>

    <!-- Navbar -->
    <div class="nav55">
    <div class="logo55">
            <img src="ar logo img/ar/apple-touch-icon.webp" alt="logo">
        </div>

        <div class="session55">
            <p>Clear Session</p>
        </div>
    </div>

    <!-- Login Box -->
    <div class="container55">
        <div class="box55">

            <h1>Forgot Password</h1>
            <p class="sub55">Email & Phone to verify user and to display Key.</p>

            <form>

                <div class="input-group55">
                    
                    <label>Email</label>
                    <input type="email" placeholder="Enter your email">
                </div>

                <div class="input-group55">
                    <label>Phone</label>
                    <div class="password-box55">
                        <input type="phone number" placeholder="Enter your Phone Number">
                        
                    </div>
                </div>

               <a href="index.html" class="forgot55">Back to login</a>
                <button class="btn55">Request Key</button>
                
                 
            </form>
            
        </div>
         
    </div>
        <p class="copyright55">© 2026 AR Typing Platform. All rights reserved.</p>

        
</body>
</html>

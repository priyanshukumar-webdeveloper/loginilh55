<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="style.css">
     
    <link rel="stylesheet" href="media.css">
     
</head>
<body>

    <!-- Navbar -->
    <div class="head">
    <div class="logo">
            <img src="ar logo img/ar/apple-touch-icon.webp" alt="logo">
        </div>

        <div class="session">
            <a href="index.html">Go To Home</a>
        </div>
    </div>
          <!-- Registration form -->

     <div class="main">
      <div class="box2">
        <h1>Create your AR Typing Account</h1>
        <p>Start free • Upgrade anytime • Takes less than a minute</p>
        <form action="">
            <div class="box3">
            <div class="input-area2">
                <label>First Name </label>
                <input type="First Name" placeholder="Enter First Name">
            </div>
            <div class="input-area2">
                <label>Last Name </label>
                <input type="Last Name" placeholder="Enter Last Name">
            </div>
            </div>
            <div class="input-area">
                <label>Email </label>
                <input type="email" placeholder="Enter Email">
            </div>
            <div class="input-area">
                <label>Password</label>
                <input type="password" placeholder="Enter Password">
            </div>

            <div class="terms">
            <input type="checkbox">
            <label class="condition">I agree to the <span>Terms of Service</span> and <span>Privacy Policy</span></label>
         </div>

         <div class="btn2">
           <a href="index.html"><button>Signup as Student</button></a> 
         </div>
         <div class="signin">
            <label>Already have an account?</label>
           <a href="index.html">Sign in</a>
         </div>
        </form>
         
      </div>
    
     </div>

    <div class="footer">
         <p>© 2026 AR Typing Platform. All rights reserved.</p>
    </div>
    
</body>
</html>
